---
name: lean-action-ci

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build, test and lint the project
        id: build-lean
        uses: leanprover/lean-action@v1

      - name: Run executable smoke-tests
        run: |
          lake exe wordpuzzle -h
          lake exe wordpuzzle -s 4 -m c -l cadevrsoi

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Re-build the project
        uses: leanprover/lean-action@v1
        with:
          test: false
          lint: false

      - name: Build documentation
        run: |
          cd docbuild
          lake build Wordpuzzle:docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docbuild/.lake/build/doc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: docbuild/.lake/build/doc
          fetch-depth: 1

      - name: Build project and executable
        uses: leanprover/lean-action@v1
        with:
          test: false
          lint: false
          build-args: wordpuzzle

      - name: Build documentation
        run: |
          cd docbuild
          lake build Wordpuzzle:docs

      - name: Create release archive
        run: |
          mkdir -p release/doc
          cp -r docbuild/.lake/build/doc/* release/doc/ || true
          cp .lake/build/bin/wordpuzzle release/
          tar -czvf wordpuzzle-linux.tar.gz -C release .

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wordpuzzle-linux.tar.gz
