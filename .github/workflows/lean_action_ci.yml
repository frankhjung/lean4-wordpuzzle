---
name: lean-action-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Lake build directory
        uses: actions/cache@v4
        with:
          path: .lake
          key: "lake-\
            ${{ runner.os }}-\
            ${{ runner.arch }}-\
            ${{ hashFiles('lean-toolchain') }}-\
            ${{ hashFiles('lake-manifest.json') }}-\
            ${{ github.ref_name }}-\
            ${{ github.sha }}"
          restore-keys: "lake-\
            ${{ runner.os }}-\
            ${{ runner.arch }}-\
            ${{ hashFiles('lean-toolchain') }}-\
            ${{ hashFiles('lake-manifest.json') }}-\
            ${{ github.ref_name }}-\n\
            lake-\
            ${{ runner.os }}-\
            ${{ runner.arch }}-\
            ${{ hashFiles('lean-toolchain') }}-\
            ${{ hashFiles('lake-manifest.json') }}-\
            main-\n\
            lake-\
            ${{ runner.os }}-\
            ${{ runner.arch }}-\
            ${{ hashFiles('lean-toolchain') }}-\
            ${{ hashFiles('lake-manifest.json') }}-"

      - name: Build and lint the project
        id: build-lean
        uses: leanprover/lean-action@v1
        with:
          use-github-cache: "false"

      - name: Run executable smoke-tests
        run: |
          lake exe wordpuzzle
          lake exe wordpuzzle -s 4 -m c -l cadevrsoi

      - name: Build documentation
        if: github.ref == 'refs/heads/main'
        uses: leanprover-community/docgen-action@main
        continue-on-error: true
